name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build_and_test:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Node Dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Node Tests
        run: pnpm test

      - name: Build
        run: pnpm turbo run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Test Dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -r services/safety-service/requirements.txt
          pip install -r services/fan-pulse-service/requirements.txt
          pip install -r services/predict-engine/requirements.txt

      - name: Python Tests — Safety Service
        run: python -m pytest services/safety-service/tests/ -v

      - name: Python Tests — Fan Pulse Service
        run: python -m pytest services/fan-pulse-service/tests/ -v

      - name: Python Tests — Predict Engine
        run: python -m pytest services/predict-engine/tests/ -v
